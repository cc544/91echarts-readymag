<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECharts</title>
  <!-- 1. 引入ECharts CDN：无需本地下载，直接加载线上资源，保证跨环境可用 -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    /* 2. 清除默认样式 + 全屏适配：消除白边、保证图表占满容器 */
    * {margin:0;padding:0;box-sizing:border-box}
    html,body {width:100%;height:100%;overflow:hidden}
    #main {width:100%;height:100%}
  </style>
</head>
<body>
<div id="main"></div> <!-- 3. 图表挂载容器：ECharts 需要绑定到具体 DOM 节点 -->
<script>
// 4. 初始化图表
const chartDom = document.getElementById('main');
const myChart = echarts.init(chartDom);
// 5. 图表配置项：核心数据/样式配置，可替换为自己的需求（如示例中的政策扶持数据）
const option = {
  backgroundColor: 'transparent', // 关键：适配Readymag页面背景透明
  xAxis: {type: 'category', data: ['周一','周二','周三','周四','周五','周六','周日']},
  yAxis: {type: 'value'},
  series: [{type: 'bar', data: [120,200,150,80,70,110,130]}]
};
myChart.setOption(option); // 6. 渲染图表
// 7. 响应式适配：iframe大小变化时，图表自动重绘
window.addEventListener('resize', ()=>myChart.resize())
</script>
</body>
</html>
